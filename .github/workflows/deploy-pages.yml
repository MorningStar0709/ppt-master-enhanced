# GitHub Pages 部署工作流
# 自动将 PPT Master 示例项目部署到 GitHub Pages

name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时触发
  push:
    branches: ["main"]
  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Stage public site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp viewer.html _site/
          cp -R docs _site/
          cp -R examples _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 仅上传公开站点所需内容，避免 temp/ 等内部目录进入 Pages 制品
          path: '_site'

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
